<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PBS - Kabupaten Lombok Barat</title>
    <!-- Tailwind CSS untuk layouting dasar yang responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* Slate 900 */
        }

        /* Latar Belakang Tema Data/Teknologi */
        .data-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            perspective: 1000px;
        }

        /* Animasi Gradient Latar */
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: moveOrb 15s infinite alternate ease-in-out;
            z-index: 2;
        }

        .orb-1 { width: 400px; height: 400px; background: #0284c7; top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #3b82f6; bottom: -200px; right: -100px; animation-delay: -5s; }

        /* Kontainer Utama Glassmorphism */
        .glass-container {
            position: relative;
            z-index: 10;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUpContainer 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Animasi Logo Melayang dan Bercahaya */
        .logo-wrapper {
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(56,189,248,0.4) 0%, rgba(56,189,248,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulseGlow 2s infinite alternate;
        }

        .main-logo {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }

        .main-logo:hover {
            transform: scale(1.05);
        }

        /* Teks Efek Animasi */
        .animate-text-1 { opacity: 0; animation: fadeUpText 0.8s ease forwards 0.5s; }
        .animate-text-2 { opacity: 0; animation: fadeUpText 0.8s ease forwards 0.7s; }
        .animate-text-3 { opacity: 0; animation: fadeUpText 0.8s ease forwards 0.9s; }
        .animate-button { opacity: 0; animation: fadeUpText 0.8s ease forwards 1.1s; }

        /* Keyframes */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; }
        }

        @keyframes fadeUpContainer {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpText {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes moveOrb {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 50px); }
        }

        /* Dekorasi Sudut untuk kesan Dashboard Data */
        .corner-border {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #38bdf8;
            border-style: solid;
        }
        .corner-tl { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
        .corner-tr { top: -2px; right: -2px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-100">

    <!-- Latar Belakang Data Animasi -->
    <div class="data-bg"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>

    <!-- Konten Utama -->
    <div class="glass-container relative p-10 md:p-14 rounded-2xl w-full max-w-lg text-center mx-4">
        
        <!-- Ornamen Sudut -->
        <div class="corner-border corner-tl"></div>
        <div class="corner-border corner-tr"></div>
        <div class="corner-border corner-bl"></div>
        <div class="corner-border corner-br"></div>

        <!-- Header / Label Program -->
        <div class="animate-text-1 inline-block mb-8 px-4 py-1.5 rounded-full bg-blue-900/50 border border-blue-400/30 text-blue-300 text-xs md:text-sm font-semibold tracking-wider uppercase">
            Data PBS Kemendikdasmen
        </div>

        <!-- Animasi Logo -->
        <div class="logo-wrapper mx-auto mb-8 w-32 h-32 md:w-40 md:h-40 flex items-center justify-center">
            <div class="logo-glow"></div>
            <!-- Menggunakan file lokal logo Anda -->
            <img 
                src="Logo Lobar Blue.png" 
                alt="Logo Kabupaten Lombok Barat" 
                class="main-logo max-h-full max-w-full object-contain relative z-10"
                onerror="this.onerror=null; this.src='https://placehold.co/200x200/0284c7/ffffff?text=Logo+Lobar';"
            />
        </div>

        <!-- Judul Aplikasi -->
        <h1 class="animate-text-2 text-3xl md:text-4xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-white to-blue-300">
            Dashboard PBS
        </h1>
        
        <!-- Subjudul Daerah -->
        <h2 class="animate-text-3 text-lg md:text-xl text-slate-400 mb-10 font-light">
            Kabupaten Lombok Barat
        </h2>

        <!-- Tombol / Indikator Masuk -->
        <div class="animate-button">
            <button class="group relative px-8 py-3 w-full bg-gradient-to-r from-blue-600 to-sky-500 rounded-lg font-semibold text-white overflow-hidden shadow-[0_0_20px_rgba(56,189,248,0.3)] transition-all hover:shadow-[0_0_30px_rgba(56,189,248,0.6)] hover:-translate-y-1">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    Masuk ke Dashboard
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </span>
                <!-- Efek kilau pada tombol -->
                <div class="absolute inset-0 h-full w-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1s_infinite]"></div>
            </button>
            <style>
                @keyframes shimmer {
                    100% { transform: translateX(100%); }
                }
            </style>
        </div>

        <!-- Footer Kecil -->
        <div class="animate-button mt-8 text-xs text-slate-500">
            Sistem Informasi Pengelolaan Data Pendidikan<br>
            &copy; 2024 Kemendikdasmen
        </div>
    </div>

</body>
</html>
